# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
# yaml-language-server: $schema=https://taskfile.dev/schema.json
$schema: https://taskfile.dev/schema.json
version: '3'

tasks:
  build:
    desc: Build winfocus.exe
    cmds:
      - cmd: cmd /c "scripts\\build.bat"
        platforms: [windows]
    sources:
      - winfocus.c
    generates:
      - out/winfocus.exe
      - out/winfocus.obj

  clean:
    desc: Clean build artifacts
    cmds:
      - cmd: cmd /c "if exist out rmdir /s /q out"
        platforms: [windows]

  default:
    desc: Build winfocus.exe (default)
    cmds:
      - task: build
