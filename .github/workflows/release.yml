# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build (Release)
        shell: pwsh
        run: pwsh -NoProfile -File build.ps1 -Version $env:VERSION -Config Release

      - name: Copy assets
        shell: pwsh
        run: |
          Copy-Item 'winfocus.toml' 'out/'

      - name: Create zip package
        shell: pwsh
        run: |
          $zipName = "winfocus-$env:TAG_NAME-x64.zip"
          Compress-Archive -Path 'out/winfocus.exe','out/winfocus.toml' -DestinationPath "out/$zipName" -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload release asset
        shell: bash
        run: gh release upload "$TAG_NAME" "out/$ZIP_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
