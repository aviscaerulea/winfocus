# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git describe でタグからバージョンを取得するため全履歴を取得

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build release package
        run: task release
        shell: pwsh

      - name: Upload artifact to release
        run: |
          $zip = Get-ChildItem out/*.zip | Select-Object -First 1
          gh release upload $env:GITHUB_REF_NAME $zip.FullName --clobber
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
