# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# winfocus 設定ファイル
##################################################

# ツールウィンドウホワイトリスト
[toolwindow_whitelist]
# WS_EX_TOOLWINDOW スタイルを持つウィンドウのうち処理対象にするクラス名
#
# タスクバーに表示されないツールウィンドウは通常スキップされるが、
# ここに列挙したクラス名のウィンドウは例外的に処理対象とする。
# クラス名は Spy++ または winspy 等で確認できる。
# 注意：配列は 1 行で記述すること（複数行配列は非対応）
classes = ["SystemMetersWnd"]
