# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# winfocus 設定ファイル
##################################################

# ツールウィンドウホワイトリスト
[toolwindow_whitelist]
# WS_EX_TOOLWINDOW スタイルを持つウィンドウのうち処理対象にするクラス名
#
# タスクバーに表示されないツールウィンドウは通常スキップされるが、
# ここに列挙したクラス名のウィンドウは例外的に処理対象とする。
# クラス名は Spy++ または winspy 等で確認できる。
# 注意：配列は 1 行で記述すること（複数行配列は非対応）
classes = ["SystemMetersWnd"]

# 保存ファイル設定
[save_file]
# 保存ファイル（winfocus.dat）の有効期限（単位：時間）
#
# --restore 実行時、保存ファイルの更新日時から expiry_hours 時間以上
# 経過していれば、ファイル不在として扱い何もせずに終了する。
# 0 以上の整数を指定する。
# 0 を設定すると有効期限判定を無効化し、保存ファイルは永久に有効扱いとなる。
# 負値や非数値が指定された場合はデフォルト値が使われる。
# デフォルト値：24（= 24 時間）
expiry_hours = 24
